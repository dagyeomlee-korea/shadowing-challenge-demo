services:
  - type: web
    name: shadowing-challenge
    env: python
    plan: free
    buildCommand: pip install -r requirements-web.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SHADOWING_ASR_MODEL
        value: tiny
